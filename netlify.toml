# SchnellR — Netlify Konfiguration

[build]
  publish = "."       # Root-Verzeichnis = Publish-Ordner (kein Build-Schritt nötig)

# ── Sicherheits-Header ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(self), camera=()"

# ── Cache: statische Assets lang cachen ──────────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Service Worker: nie cachen (muss immer aktuell sein) ─────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── SPA-Fallback: alle Pfade → index.html ────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
